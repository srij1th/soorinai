<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="stats">
  <div class="container card">
    <h1>Player Stats</h1>
    <p id="statsUsername"></p>
    <ul class="stats-list">
      <li>Games Played: <span id="gamesPlayed">0</span></li>
      <li>Wins: <span id="wins">0</span></li>
      <li>Losses: <span id="losses">0</span></li>
      <li>Draws: <span id="draws">0</span></li>
    </ul>
    <button id="backBtn" class="secondary">Back</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
